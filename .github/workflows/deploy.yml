name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      deploy_frontend: ${{ steps.check.outputs.deploy_frontend }}
      deploy_backend: ${{ steps.check.outputs.deploy_backend }}
    steps:
      - name: Check available deployment secrets
        id: check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$VERCEL_ORG_ID" ]; then
            echo "deploy_frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_frontend=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "deploy_backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_backend=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.deploy_frontend == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install Vercel CLI
        run: npm install --global vercel
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
      - name: Build frontend
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend
      - name: Deploy frontend
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: frontend

  deploy-backend:
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ needs.prepare.outputs.deploy_backend == 'true' }}
    steps:
      - name: Trigger Render deploy hook
        run: curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"